# Builds the MyST/Jupyter Book site and publishes to the gh-pages branch.
# Repo Settings → Pages: set source to branch gh-pages, folder / (root).
name: Deploy Jupyter Book

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "jupyter-book>=2.0.0a0"
          pip install "mystmd==1.6.0"
          pip install -r requirements.txt

      - name: Build Jupyter Book HTML
        run: |
          cd book
          BASE_URL=/Creative-AI myst build --html --execute

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book/_build/html
          force_orphan: true
