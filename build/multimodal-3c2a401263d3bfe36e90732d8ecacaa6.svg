<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" role="img" aria-label="Multimodal model schematic">
  <style>
    .box { fill: #f4f1fa; stroke: #5a2a7a; stroke-width: 2; rx: 10; ry: 10; }
    .core { fill: #5a2a7a; stroke: #5a2a7a; rx: 14; ry: 14; }
    .out { fill: #fff0f3; stroke: #e8556d; stroke-width: 2; rx: 10; ry: 10; }
    .label { font: 600 14px Helvetica, Arial, sans-serif; fill: #1f2545; }
    .out-label { font: 600 14px Helvetica, Arial, sans-serif; fill: #1f2545; }
    .core-label { font: 700 17px Helvetica, Arial, sans-serif; fill: #fff; }
    .arrow { fill: none; stroke: #1f2545; stroke-width: 2; marker-end: url(#a); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2545"/>
    </marker>
  </defs>
  <!-- inputs -->
  <rect class="box" x="40"  y="40"  width="160" height="50"/>
  <text class="label" x="120" y="71"  text-anchor="middle">Text in</text>
  <rect class="box" x="40"  y="110" width="160" height="50"/>
  <text class="label" x="120" y="141" text-anchor="middle">Image in</text>
  <rect class="box" x="40"  y="180" width="160" height="50"/>
  <text class="label" x="120" y="211" text-anchor="middle">Audio in</text>
  <rect class="box" x="40"  y="250" width="160" height="50"/>
  <text class="label" x="120" y="281" text-anchor="middle">Video in</text>
  <!-- core -->
  <rect class="core" x="340" y="120" width="160" height="100"/>
  <text class="core-label" x="420" y="160" text-anchor="middle">Shared</text>
  <text class="core-label" x="420" y="190" text-anchor="middle">transformer</text>
  <!-- outputs -->
  <rect class="out" x="620" y="40"  width="160" height="50"/>
  <text class="out-label" x="700" y="71"  text-anchor="middle">Text out</text>
  <rect class="out" x="620" y="110" width="160" height="50"/>
  <text class="out-label" x="700" y="141" text-anchor="middle">Image out</text>
  <rect class="out" x="620" y="180" width="160" height="50"/>
  <text class="out-label" x="700" y="211" text-anchor="middle">Audio out</text>
  <rect class="out" x="620" y="250" width="160" height="50"/>
  <text class="out-label" x="700" y="281" text-anchor="middle">Action / code</text>
  <!-- arrows in -->
  <path class="arrow" d="M 200 65  L 340 150"/>
  <path class="arrow" d="M 200 135 L 340 165"/>
  <path class="arrow" d="M 200 205 L 340 185"/>
  <path class="arrow" d="M 200 275 L 340 200"/>
  <!-- arrows out -->
  <path class="arrow" d="M 500 150 L 620 65"/>
  <path class="arrow" d="M 500 165 L 620 135"/>
  <path class="arrow" d="M 500 185 L 620 205"/>
  <path class="arrow" d="M 500 200 L 620 275"/>
</svg>
