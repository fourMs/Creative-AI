<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="A simple machine learning pipeline">
  <style>
    .box { fill: #f4f1fa; stroke: #5a2a7a; stroke-width: 2; rx: 12; ry: 12; }
    .label { font: 600 16px Helvetica, Arial, sans-serif; fill: #1f2545; }
    .small { font: 500 13px Helvetica, Arial, sans-serif; fill: #444; }
    .arrow { fill: none; stroke: #1f2545; stroke-width: 2; marker-end: url(#a); }
    .loop { fill: none; stroke: #e8556d; stroke-width: 2; marker-end: url(#a2); stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2545"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8556d"/>
    </marker>
  </defs>
  <rect class="box" x="40"  y="100" width="120" height="60"/>
  <text class="label" x="100" y="135" text-anchor="middle">Data</text>
  <rect class="box" x="220" y="100" width="160" height="60"/>
  <text class="label" x="300" y="130" text-anchor="middle">Model</text>
  <text class="small" x="300" y="150" text-anchor="middle">(parameters)</text>
  <rect class="box" x="440" y="100" width="160" height="60"/>
  <text class="label" x="520" y="135" text-anchor="middle">Prediction</text>
  <rect class="box" x="660" y="100" width="100" height="60"/>
  <text class="label" x="710" y="135" text-anchor="middle">Loss</text>
  <path class="arrow" d="M 160 130 L 220 130"/>
  <path class="arrow" d="M 380 130 L 440 130"/>
  <path class="arrow" d="M 600 130 L 660 130"/>
  <path class="loop" d="M 710 100 C 710 40, 300 40, 300 100"/>
  <text class="small" x="500" y="40" text-anchor="middle" fill="#e8556d">update parameters to reduce loss</text>
</svg>
