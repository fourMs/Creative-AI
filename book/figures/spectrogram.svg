<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-label="Schematic spectrogram">
  <style>
    .axis { stroke: #333; stroke-width: 2; }
    .tick-label { font: 500 12px Helvetica, Arial, sans-serif; fill: #333; }
    .label { font: 700 14px Helvetica, Arial, sans-serif; fill: #1f2545; }
  </style>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
