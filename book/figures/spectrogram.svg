  <text class="tick-label" x="50" y="310" text-anchor="end">low</text>
  <text class="label" transform="rotate(-90)" x="-175" y="25" text-anchor="middle">frequency</text>
  <text class="label" x="350" y="345" text-anchor="middle">time ’</text>
